<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GembaShot CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{background:#0F1117;font-family:Inter,system-ui,sans-serif;color:#E5E7EB}
    input[type=range]{cursor:pointer}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#13151F}
    ::-webkit-scrollbar-thumb{background:#2D3148;border-radius:3px}
    *{scrollbar-width:thin;scrollbar-color:#2D3148 #13151F}
    input,select,textarea{outline:none}
    input:focus,select:focus,textarea:focus{border-color:#00C896 !important}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useMemo,useEffect,useCallback,useRef}=React;

// ══════════════════════════════════════════════════════════════
//  CONFIGURAZIONE — modifica solo questa sezione
// ══════════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbx4idhlf4rlzBTkqUt_LAVIvtgWxV9TQEXXt440opwzhON6A_Nu5J12d58eM3ByrQAa/exec";
// Esempio: "https://script.google.com/macros/s/AKfycbx.../exec"
// ══════════════════════════════════════════════════════════════

// ─── API CLIENT ────────────────────────────────────────────────
async function api(action, payload={}, token=null){
  try{
    const body={action,...payload};
    if(token) body.token=token;
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"}, // Apps Script richiede text/plain per CORS
      body:JSON.stringify(body)
    });
    return await res.json();
  }catch(e){
    return {ok:false,error:"Errore di rete: "+e.message};
  }
}

// ─── SESSION STORAGE ───────────────────────────────────────────
const SESSION_KEY="gembashot_session";
function loadSession(){try{return JSON.parse(sessionStorage.getItem(SESSION_KEY))||null;}catch{return null;}}
function saveSession(s){sessionStorage.setItem(SESSION_KEY,JSON.stringify(s));}
function clearSession(){sessionStorage.removeItem(SESSION_KEY);}

// ─── CONSTANTS ─────────────────────────────────────────────────
const PHASES=[
  {key:"lead",label:"Lead",color:"#6B7280"},
  {key:"qualified",label:"Qualificato",color:"#3B82F6"},
  {key:"meeting",label:"Meeting",color:"#8B5CF6"},
  {key:"demo",label:"Demo",color:"#F59E0B"},
  {key:"proposal",label:"Proposta",color:"#00C896"},
  {key:"negotiation",label:"Negoziazione",color:"#FF6B35"},
  {key:"won",label:"Vinto",color:"#10B981"},
  {key:"lost",label:"Perso",color:"#EF4444"},
];
const SECTORS=["Manifatturiero","Automotive","Farmaceutico","Alimentare","Logistica","Elettronica","Altro"];
const LOST_Q=[
  {id:"q1",text:"Motivo principale della mancata acquisizione?"},
  {id:"q2",text:"Il prezzo è stato determinante?"},
  {id:"q3",text:"È stata scelta una soluzione alternativa? Quale?"},
  {id:"q4",text:"Funzionalità assenti o insufficienti?"},
  {id:"q5",text:"Il timing era corretto rispetto ai bisogni?"},
  {id:"q6",text:"L'interlocutore aveva potere decisionale?"},
  {id:"q7",text:"Possibilità di riprendere la trattativa in futuro?"},
  {id:"q8",text:"Cosa avremmo potuto fare diversamente?"},
];

// ─── HELPERS ───────────────────────────────────────────────────
const daysBetween=(d1,d2)=>Math.round(Math.abs(new Date(d2)-new Date(d1))/86400000);
const phaseOf=key=>PHASES.find(p=>p.key===key)||PHASES[0];
const mantScore=m=>Math.round(((m.money+m.authority+m.need+m.time)/4)*10)/10;
const todayStr=()=>new Date().toISOString().slice(0,10);

// ─── STYLES HELPERS ────────────────────────────────────────────
const card={background:"#1A1D27",border:"1px solid #252836",borderRadius:8};
const inputSt={width:"100%",background:"#0F1117",border:"1px solid #374151",color:"#E5E7EB",borderRadius:4,padding:"8px 10px",fontSize:13,boxSizing:"border-box",fontFamily:"inherit"};
const btnGreen={padding:"9px 22px",background:"#00C896",border:"none",color:"#0F1117",borderRadius:5,cursor:"pointer",fontWeight:700,fontSize:13};
const btnGray={padding:"8px 18px",background:"#252836",border:"none",color:"#9CA3AF",borderRadius:5,cursor:"pointer",fontSize:13};
const label=(text)=><label style={{display:"block",fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>{text}</label>;

// ═══════════════════════════════════════════════════════════════
//  LOGIN SCREEN
// ═══════════════════════════════════════════════════════════════
function LoginScreen({onLogin}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");

  const handleLogin=async(e)=>{
    e.preventDefault();
    if(!username||!password){setError("Inserisci username e password.");return;}
    setLoading(true);setError("");
    const res=await api("login",{username,password});
    setLoading(false);
    if(res.ok){
      const session={token:res.token,username:res.username,displayName:res.displayName,role:res.role};
      saveSession(session);
      onLogin(session);
    }else{
      setError(res.error||"Errore di login.");
    }
  };

  return(
    <div style={{minHeight:"100vh",background:"#0F1117",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      {/* Logo area */}
      <div style={{marginBottom:40,textAlign:"center"}}>
        <div style={{fontSize:11,color:"#4B5563",letterSpacing:4,textTransform:"uppercase",marginBottom:10}}>Benvenuto in</div>
        <div style={{fontSize:36,fontWeight:800,color:"#00C896",letterSpacing:-1,lineHeight:1}}>GembaShot</div>
        <div style={{fontSize:12,color:"#374151",letterSpacing:3,textTransform:"uppercase",marginTop:6}}>CRM Pipeline</div>
        {/* Decorative MTM bars */}
        <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:20,alignItems:"flex-end"}}>
          {[6,9,4,8,5,7,3,9,6].map((h,i)=>(
            <div key={i} style={{width:6,height:h*3,background:i%3===0?"#00C896":i%3===1?"#374151":"#252836",borderRadius:2,opacity:0.7}}/>
          ))}
        </div>
      </div>

      {/* Form */}
      <div style={{...card,width:"100%",maxWidth:380,padding:32}}>
        <h2 style={{margin:"0 0 24px",fontSize:18,color:"#F9FAFB",fontWeight:600}}>Accedi al CRM</h2>
        {error&&(
          <div style={{background:"#2D1515",border:"1px solid #7F1D1D",borderRadius:6,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#FCA5A5"}}>
            {error}
          </div>
        )}
        <form onSubmit={handleLogin}>
          <div style={{marginBottom:16}}>
            {label("Username")}
            <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="es. christian"
              autoComplete="username" style={inputSt}/>
          </div>
          <div style={{marginBottom:24}}>
            {label("Password")}
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"
              autoComplete="current-password" style={inputSt}/>
          </div>
          <button type="submit" disabled={loading}
            style={{...btnGreen,width:"100%",padding:"11px",fontSize:14,opacity:loading?0.7:1}}>
            {loading?"Accesso in corso...":"Accedi"}
          </button>
        </form>
      </div>
      <div style={{marginTop:20,fontSize:11,color:"#374151"}}>GembaShot CRM v2.0 · Dati su Google Sheets</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  MANT BARS
// ═══════════════════════════════════════════════════════════════
function MantBars({mant,size="normal"}){
  const keys=["money","authority","need","time"];
  const labels={money:"M",authority:"A",need:"N",time:"T"};
  const avg=mantScore(mant);
  const barH=size==="small"?32:56,barW=size==="small"?8:14;
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:size==="small"?6:10}}>
      {keys.map(k=>{
        const col=mant[k]>=7?"#00C896":mant[k]>=4?"#F59E0B":"#EF4444";
        return(
          <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{width:barW,height:barH,background:"#252836",borderRadius:2,display:"flex",flexDirection:"column",justifyContent:"flex-end",overflow:"hidden"}}>
              <div style={{width:"100%",height:(mant[k]/10)*barH,background:col,transition:"height .4s"}}/>
            </div>
            {size!=="small"&&<span style={{fontSize:9,color:"#6B7280",fontWeight:700,letterSpacing:1}}>{labels[k]}</span>}
          </div>
        );
      })}
      <div style={{marginLeft:size==="small"?4:8,display:"flex",flexDirection:"column",justifyContent:"center"}}>
        <span style={{fontSize:size==="small"?14:20,fontWeight:700,color:"#00C896",fontFamily:"monospace"}}>{avg.toFixed(1)}</span>
        {size!=="small"&&<span style={{fontSize:9,color:"#6B7280"}}>MANT avg</span>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  MANT CHART
// ═══════════════════════════════════════════════════════════════
function MantChart({mantHistory}){
  const [tt,setTt]=useState(null);
  if(!mantHistory||mantHistory.length<1)
    return<div style={{color:"#6B7280",fontSize:13,textAlign:"center",padding:32}}>Nessuno storico MANT. Salva il MANT per avviare il tracciamento.</div>;

  const W=620,H=210,PL=44,PR=20,PT=20,PB=44;
  const cW=W-PL-PR,cH=H-PT-PB,n=mantHistory.length;
  const xOf=i=>PL+(n===1?cW/2:(i/(n-1))*cW);
  const yOf=v=>PT+cH-(v/10)*cH;
  const lines=[{key:"money",color:"#3B82F6"},{key:"authority",color:"#8B5CF6"},{key:"need",color:"#00C896"},{key:"time",color:"#FF6B35"}];

  return(
    <div style={{userSelect:"none"}}>
      <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
        {lines.map(l=>(
          <div key={l.key} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:18,height:2,background:l.color}}/><span style={{fontSize:11,color:"#9CA3AF",textTransform:"capitalize"}}>{l.key}</span>
          </div>
        ))}
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:18,height:0,borderTop:"2px dashed #F9FAFB"}}/><span style={{fontSize:11,color:"#9CA3AF"}}>Media</span>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
        {[2,4,6,8,10].map(v=>(
          <g key={v}>
            <line x1={PL} y1={yOf(v)} x2={W-PR} y2={yOf(v)} stroke="#252836" strokeWidth={1}/>
            <text x={PL-6} y={yOf(v)+4} fontSize={9} fill="#4B5563" textAnchor="end">{v}</text>
          </g>
        ))}
        <line x1={PL} y1={PT} x2={PL} y2={PT+cH} stroke="#252836" strokeWidth={1}/>
        {mantHistory.map((_,i)=>(
          <line key={i} x1={xOf(i)} y1={PT} x2={xOf(i)} y2={PT+cH} stroke="#1E2130" strokeDasharray="3,4" strokeWidth={1}/>
        ))}
        {lines.map(l=>(
          <polyline key={l.key} points={mantHistory.map((h,i)=>`${xOf(i)},${yOf(h.mant[l.key])}`).join(" ")}
            fill="none" stroke={l.color} strokeWidth={2} strokeLinejoin="round" opacity={0.85}/>
        ))}
        {n>1&&<polyline points={mantHistory.map((h,i)=>`${xOf(i)},${yOf(mantScore(h.mant))}`).join(" ")}
          fill="none" stroke="#F9FAFB" strokeWidth={1.5} strokeDasharray="5,4" opacity={0.4}/>}
        {mantHistory.map((h,i)=>{
          const x=xOf(i),y=yOf(mantScore(h.mant));
          return(
            <g key={i}>
              <text x={x} y={PT+cH+16} fontSize={9} fill="#6B7280" textAnchor="middle">{h.date}</text>
              {lines.map(l=><circle key={l.key} cx={x} cy={yOf(h.mant[l.key])} r={3} fill={l.color} stroke="#0F1117" strokeWidth={1}/>)}
              <circle cx={x} cy={y} r={6} fill="#F9FAFB" stroke="#0F1117" strokeWidth={1.5} style={{cursor:"pointer"}}
                onMouseEnter={()=>setTt({x,y,h})} onMouseLeave={()=>setTt(null)}/>
            </g>
          );
        })}
        {tt&&(()=>{
          const tw=210,th=96;
          const tx=Math.min(Math.max(tt.x-tw/2,PL),W-PR-tw);
          const ty=tt.y>PT+cH/2?tt.y-th-14:tt.y+14;
          return(
            <g>
              <rect x={tx} y={ty} width={tw} height={th} rx={6} fill="#1A1D27" stroke="#00C896" strokeWidth={1}/>
              <text x={tx+10} y={ty+18} fontSize={11} fill="#00C896" fontWeight="bold">{tt.h.date}</text>
              <foreignObject x={tx+8} y={ty+24} width={tw-16} height={42}>
                <div xmlns="http://www.w3.org/1999/xhtml" style={{fontSize:"10px",color:"#9CA3AF",lineHeight:"1.4",wordBreak:"break-word"}}>{tt.h.event}</div>
              </foreignObject>
              <text x={tx+10} y={ty+80} fontSize={10} fill="#6B7280">{`M:${tt.h.mant.money} A:${tt.h.mant.authority} N:${tt.h.mant.need} T:${tt.h.mant.time} · avg ${mantScore(tt.h.mant).toFixed(1)}`}</text>
            </g>
          );
        })()}
      </svg>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  MANT EDITOR
// ═══════════════════════════════════════════════════════════════
function MantEditor({mant,onChange}){
  const defs={money:"Money — Budget disponibile",authority:"Authority — Potere decisionale",need:"Need — Bisogno reale",time:"Time — Urgenza / scadenza"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {Object.keys(defs).map(k=>{
        const col=mant[k]>=7?"#00C896":mant[k]>=4?"#F59E0B":"#EF4444";
        return(
          <div key={k}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12,color:"#9CA3AF"}}>{defs[k]}</span>
              <span style={{fontSize:13,fontWeight:700,color:col,fontFamily:"monospace"}}>{mant[k]}/10</span>
            </div>
            <input type="range" min={1} max={10} value={mant[k]} onChange={e=>onChange({...mant,[k]:+e.target.value})} style={{width:"100%",accentColor:col}}/>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  TIMELINE
// ═══════════════════════════════════════════════════════════════
function Timeline({journey}){
  if(!journey.length) return<p style={{color:"#6B7280",fontSize:13}}>Nessuna attività registrata.</p>;
  return(
    <div style={{position:"relative",paddingLeft:24}}>
      <div style={{position:"absolute",left:8,top:0,bottom:0,width:2,background:"#252836"}}/>
      {journey.map((ev,i)=>{
        const ph=phaseOf(ev.phase);
        const gap=i>0?daysBetween(journey[i-1].date,ev.date):null;
        return(
          <div key={i} style={{marginBottom:20,position:"relative"}}>
            <div style={{position:"absolute",left:-20,top:4,width:10,height:10,borderRadius:"50%",background:ph.color,border:"2px solid #0F1117"}}/>
            {gap!==null&&<div style={{fontSize:10,color:"#6B7280",marginBottom:4}}>↑ {gap} giorni</div>}
            <div style={{...card,padding:"10px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:700,color:ph.color,textTransform:"uppercase",letterSpacing:1}}>{ph.label}</span>
                <div style={{display:"flex",gap:12}}>
                  <span style={{fontSize:11,color:"#6B7280"}}>{ev.date}</span>
                  <span style={{fontSize:11,color:"#4B5563"}}>👤 {ev.actor}</span>
                </div>
              </div>
              <p style={{margin:0,fontSize:13,color:"#D1D5DB",lineHeight:1.5}}>{ev.note}</p>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  DRILLDOWN MODAL
// ═══════════════════════════════════════════════════════════════
function DrilldownModal({title,deals,onSelect,onClose}){
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{...card,width:560,maxHeight:"80vh",overflowY:"auto",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{margin:0,color:"#F9FAFB",fontSize:16}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:20}}>✕</button>
        </div>
        {deals.length===0&&<p style={{color:"#6B7280",textAlign:"center",padding:24}}>Nessun deal in questa categoria.</p>}
        {deals.map(d=>{
          const ph=phaseOf(d.status);
          return(
            <div key={d.id} onClick={()=>{onSelect(d.id);onClose();}}
              style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px",marginBottom:8,background:"#13151F",
                border:"1px solid #252836",borderLeft:`3px solid ${ph.color}`,borderRadius:7,cursor:"pointer"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#F9FAFB"}}>{d.company}</div>
                <div style={{fontSize:11,color:"#6B7280",marginTop:3}}>{d.contact} · {d.role}</div>
              </div>
              <MantBars mant={d.mant} size="small"/>
              <span style={{fontSize:10,padding:"2px 8px",background:ph.color+"22",color:ph.color,borderRadius:20,fontWeight:700,whiteSpace:"nowrap"}}>{ph.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  USER MANAGEMENT (admin only)
// ═══════════════════════════════════════════════════════════════
function UserManager({session,onClose}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({username:"",password:"",displayName:"",role:"user"});
  const [msg,setMsg]=useState("");
  const [err,setErr]=useState("");

  useEffect(()=>{
    api("getUsers",{},session.token).then(r=>{
      if(r.ok) setUsers(r.users);
      setLoading(false);
    });
  },[]);

  const flash=(m,isErr=false)=>{if(isErr)setErr(m);else setMsg(m);setTimeout(()=>{setMsg("");setErr("");},3000);};

  const saveUser=async()=>{
    if(!form.username){flash("Username obbligatorio.",true);return;}
    const r=await api("saveUser",{user:form},session.token);
    if(r.ok){flash("Utente salvato ✓");setForm({username:"",password:"",displayName:"",role:"user"});
      const r2=await api("getUsers",{},session.token);if(r2.ok)setUsers(r2.users);
    }else flash(r.error,true);
  };

  const deleteUser=async(username)=>{
    if(!confirm(`Eliminare l'utente "${username}"?`))return;
    const r=await api("deleteUser",{username},session.token);
    if(r.ok){flash("Utente eliminato");const r2=await api("getUsers",{},session.token);if(r2.ok)setUsers(r2.users);}
    else flash(r.error,true);
  };

  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{...card,width:600,maxHeight:"85vh",overflowY:"auto",padding:28}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:22}}>
          <h2 style={{margin:0,color:"#F9FAFB",fontSize:18}}>Gestione Utenti</h2>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:20}}>✕</button>
        </div>

        {msg&&<div style={{background:"#0D2818",border:"1px solid #065F46",borderRadius:6,padding:"9px 14px",marginBottom:14,fontSize:13,color:"#6EE7B7"}}>{msg}</div>}
        {err&&<div style={{background:"#2D1515",border:"1px solid #7F1D1D",borderRadius:6,padding:"9px 14px",marginBottom:14,fontSize:13,color:"#FCA5A5"}}>{err}</div>}

        {/* Lista utenti */}
        <div style={{marginBottom:24}}>
          <p style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:1,marginBottom:12,fontWeight:600}}>Utenti attivi</p>
          {loading?<p style={{color:"#6B7280"}}>Caricamento...</p>:users.map(u=>(
            <div key={u.username} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#13151F",borderRadius:6,marginBottom:8,border:"1px solid #252836"}}>
              <div style={{flex:1}}>
                <span style={{fontWeight:600,color:"#E5E7EB"}}>{u.displayName}</span>
                <span style={{fontSize:11,color:"#6B7280",marginLeft:10}}>@{u.username}</span>
              </div>
              <span style={{fontSize:10,padding:"2px 8px",background:u.role==="admin"?"#00C89622":"#252836",color:u.role==="admin"?"#00C896":"#9CA3AF",borderRadius:20}}>{u.role}</span>
              <span style={{fontSize:10,color:"#6B7280"}}>{u.lastLogin?u.lastLogin.slice(0,10):"mai"}</span>
              {u.username!==session.username&&(
                <button onClick={()=>deleteUser(u.username)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:16}}>×</button>
              )}
            </div>
          ))}
        </div>

function ChangePasswordModal({session,onClose}){
  const [old,setOld]=useState(""),nw=useState(""),nw2=useState("");
  const [newPwd,setNewPwd]=useState(""),newPwd2,setNewPwd2;
  // semplificato con due var
  const [f,setF]=useState({old:"",new1:"",new2:""});
  const [msg,setMsg]=useState(""),err2=useState("");
  const [errMsg,setErrMsg]=useState("");

  const submit=async()=>{
    if(f.new1!==f.new2){setErrMsg("Le nuove password non coincidono.");return;}
    if(f.new1.length<6){setErrMsg("La password deve essere di almeno 6 caratteri.");return;}
    const r=await api("changePassword",{oldPassword:f.old,newPassword:f.new1},session.token);
    if(r.ok){setMsg("Password cambiata con successo ✓");setTimeout(onClose,1500);}
    else setErrMsg(r.error);

  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()}

        {errMsg&&<div style={{background:"#2D1515",border:"1px solid #7F1D1D",borderRadius:6,padding:"9px 14px",marginBottom:14,fontSize:13,color:"#FCA5A5"}}>{errMsg}</div>}
        <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:20}}>
          <div>{label("Password attuale")}<input type="password" value={f.old} onChange={e=>setF({...f,old:e.target.value})} style={inputSt}/></div>
          <div>{label("Nuova password")}<input type="password" value={f.new1} onChange={e=>setF({...f,new1:e.target.value})} style={inputSt}/></div>
          <div>{label("Ripeti nuova password")}<input type="password" value={f.new2} onChange={e=>setF({...f,new2:e.target.value})} style={inputSt}/></div>

}

function DealModal({initial,session,onClose,onSave}){
  const isNew=!initial;

    sector:"Manifatturiero",employees:"",city:"",website:"",spotter:session.displayName,
    owner:session.displayName,notes:"",mant:{money:5,authority:5,need:5,time:5}});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=async()=>{
    if(!form.company||!form.contact){alert("Azienda e contatto obbligatori.");return;}
    setSaving(true);
    const t=todayStr();
    const deal=isNew?{...form,id:Date.now(),status:"lead",createdAt:t,
      journey:[{phase:"lead",date:t,note:"Deal creato.",actor:form.spotter||session.displayName}],
      mantHistory:[{date:t,mant:{...form.mant},event:"Deal creato"}],

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {[["Azienda*","company"],["Referente*","contact"],["Ruolo","role"],["Email","email"],
            ["Telefono","phone"],["Città","city"],["Website","website"],["Dipendenti","employees"],
            ["Individuato da","spotter"],["Owner","owner"]].map(([lbl,key])=>(
            <div key={key} style={["company","website"].includes(key)?{gridColumn:"1/-1"}:{}}>
              {label(lbl)}<input value={form[key]||""} onChange={e=>set(key,e.target.value)} style={inputSt}/>

        </div>
      </div>

  );
}

function DealDetail({deal,session,onUpdate,onBack,onDelete}){
  const [tab,setTab]=useState("journey");
  const [newEv,setNewEv]=useState({phase:"meeting",date:todayStr(),note:"",actor:session.displayName});
  const [newPres,setNewPres]=useState({date:todayStr(),title:"",version:""});
  const [editMant,setEditMant]=useState({...deal.mant});
  const [mantNote,setMantNote]=useState("");
  const [flash,setFlash]=useState("");
  const [saving,setSaving]=useState(false);

  const showFlash=m=>{setFlash(m);setTimeout(()=>setFlash(""),2500);};

  const save=async(updated)=>{setSaving(true);await onUpdate(updated);setSaving(false);};

  const addEvent=async()=>{
    if(!newEv.note)return;
    const updated={...deal,status:newEv.phase,journey:[...deal.journey,{...newEv}]};
    if(newEv.phase==="lost"&&!updated.lostSurvey) updated.lostSurvey={};
    await save(updated);showFlash("Attività aggiunta ✓");
    setNewEv({phase:"meeting",date:todayStr(),note:"",actor:session.displayName});
  };
  const addPres=async()=>{
    if(!newPres.title)return;
    await save({...deal,presentations:[...deal.presentations,{...newPres}]});
    showFlash("Presentazione aggiunta ✓");setNewPres({date:todayStr(),title:"",version:""});
  };
  const saveMant=async()=>{
    const entry={date:todayStr(),mant:{...editMant},event:mantNote||"Aggiornamento MANT"};
    await save({...deal,mant:editMant,mantHistory:[...(deal.mantHistory||[]),entry]});
    setMantNote("");showFlash("MANT aggiornato ✓");
  };
  const saveAnagrafica=async(updated)=>{await save({...deal,...updated});showFlash("Anagrafica salvata ✓");};

  const ph=phaseOf(deal.status);
  const totalDays=deal.journey.length>1?daysBetween(deal.journey[0].date,deal.journey[deal.journey.length-1].date):0;
  const TABS=[{key:"journey",label:"Journey"},{key:"anagrafica",label:"Anagrafica"},
    {key:"presentazioni",label:"Presentazioni"},{key:"mant",label:"MANT"},
    ...(deal.status==="lost"?[{key:"post-mortem",label:"⚠ Post-Mortem"}]:[])];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <button onClick={onBack} style={{background:"none",border:"none",color:"#00C896",cursor:"pointer",fontSize:13,marginBottom:6,padding:0}}>← Tutti i deal</button>

          <div style={{display:"flex",gap:12,marginTop:4,alignItems:"center"}}>
            <span style={{fontSize:13,color:"#9CA3AF"}}>{deal.contact} · {deal.role}</span>

            {saving&&<span style={{fontSize:11,color:"#F59E0B"}}>⏳ Salvataggio...</span>}
          </div>
          {totalDays>0&&<div style={{fontSize:11,color:"#6B7280",marginTop:4}}>Durata: {totalDays}gg · Owner: {deal.owner} · Spotted: {deal.spotter}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
          <MantBars mant={deal.mant}/>
          {flash&&<span style={{fontSize:11,color:"#00C896",fontWeight:600}}>{flash}</span>}
          <button onClick={()=>{if(confirm("Eliminare questo deal?"))onDelete(deal.id);}}
            style={{fontSize:11,background:"none",border:"1px solid #374151",color:"#EF4444",borderRadius:4,padding:"4px 10px",cursor:"pointer"}}>Elimina deal</button>
        </div>
      </div>

      <div style={{display:"flex",borderBottom:"1px solid #252836",marginBottom:22}}>
        {TABS.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{
            padding:"9px 18px",background:"none",border:"none",cursor:"pointer",fontSize:13,
            color:tab===t.key?"#00C896":"#6B7280",borderBottom:tab===t.key?"2px solid #00C896":"2px solid transparent",
            fontWeight:tab===t.key?600:400}}>{t.label}</button>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto"}}>
        {tab==="journey"&&(
          <div>
            <Timeline journey={deal.journey}/>
            <div style={{...card,padding:16,marginTop:20}}>
              <p style={{margin:"0 0 12px",fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1}}>Aggiungi attività</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                <div>{label("Fase")}<select value={newEv.phase} onChange={e=>setNewEv({...newEv,phase:e.target.value})} style={{...inputSt,fontSize:12}}>
                  {PHASES.map(p=><option key={p.key} value={p.key}>{p.label}</option>)}</select></div>
                <div>{label("Data")}<input type="date" value={newEv.date} onChange={e=>setNewEv({...newEv,date:e.target.value})} style={{...inputSt,fontSize:12}}/></div>
                <div>{label("Attore")}<input value={newEv.actor} onChange={e=>setNewEv({...newEv,actor:e.target.value})} style={{...inputSt,fontSize:12}}/></div>
              </div>
              <textarea value={newEv.note} onChange={e=>setNewEv({...newEv,note:e.target.value})} placeholder="Descrivi l'attività..." rows={2}
                style={{...inputSt,resize:"none",marginBottom:10}}/>
              <button onClick={addEvent} style={btnGreen}>+ Aggiungi</button>

        )}
        {tab==="anagrafica"&&<AnagraficaEditor deal={deal} onSave={saveAnagrafica}/>}
        {tab==="presentazioni"&&(
          <div>
            {deal.presentations.map((p,i)=>(
              <div key={i} style={{...card,padding:"12px 16px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

            {deal.presentations.length===0&&<p style={{color:"#6B7280",fontSize:13,marginBottom:20}}>Nessuna presentazione registrata.</p>}
            <div style={{...card,padding:16,marginTop:8}}>
              <p style={{margin:"0 0 12px",fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1}}>Aggiungi presentazione</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                {[["Titolo","title","text"],["Versione","version","text"],["Data","date","date"]].map(([l,k,t])=>(
                  <div key={k}>{label(l)}<input type={t} value={newPres[k]} onChange={e=>setNewPres({...newPres,[k]:e.target.value})} style={{...inputSt,fontSize:12}}/></div>
                ))}
              </div>
              <button onClick={addPres} style={btnGreen}>+ Aggiungi</button>
            </div>
          </div>
        )}
        {tab==="mant"&&(
          <div>
            <div style={{...card,padding:20,marginBottom:20}}>
              <p style={{margin:"0 0 14px",fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Andamento MANT — hover sui punti bianchi</p>
              <MantChart mantHistory={deal.mantHistory||[]}/>
            </div>
            <div style={{...card,padding:20}}>
              <p style={{margin:"0 0 4px",fontSize:11,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Aggiorna MANT</p>
              <p style={{margin:"0 0 16px",fontSize:11,color:"#4B5563"}}>Ogni salvataggio aggiunge un punto al grafico con la motivazione indicata.</p>
              <MantEditor mant={editMant} onChange={setEditMant}/>
              <div style={{marginTop:16}}>{label("Motivazione / evento")}
                <input value={mantNote} onChange={e=>setMantNote(e.target.value)} placeholder="Es: Incontro con CFO, confermato budget Q3..." style={inputSt}/></div>

        )}
        {tab==="post-mortem"&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{background:"#2D1515",border:"1px solid #7F1D1D",borderRadius:6,padding:"10px 14px"}}>
              <span style={{color:"#FCA5A5",fontSize:12,fontWeight:600}}>⚠ Deal chiuso come PERSO — compila il questionario post-mortem</span>
            </div>
            {LOST_Q.map(q=>(
              <div key={q.id}>{label(q.text)}
                <textarea value={(deal.lostSurvey||{})[q.id]||""} rows={2}
                  onChange={e=>save({...deal,lostSurvey:{...(deal.lostSurvey||{}),[q.id]:e.target.value}})}

            ))}

        )}

    </div>
  );

// ═══════════════════════════════════════════════════════════════

                </div>
                <div style={{fontSize:12,color:"#9CA3AF"}}>{d.contact} · {d.role} · {d.city}</div>
              </div>

                <div style={{fontSize:20,fontWeight:700,color:avg>=7?"#00C896":avg>=4?"#F59E0B":"#EF4444",fontFamily:"monospace"}}>{avg.toFixed(1)}</div>
                <div style={{fontSize:9,color:"#6B7280"}}>MANT</div>

function Dashboard({deals,onSelect}){
  const [drilldown,setDrilldown]=useState(null);
  const byS=s=>deals.filter(d=>d.status===s);
  const active=deals.filter(d=>!["won","lost"].includes(d.status));
  const avgMant=deals.length?(deals.reduce((a,d)=>a+mantScore(d.mant),0)/deals.length).toFixed(1):"—";
  const stats=[
    {label:"Deal attivi",value:active.length,color:"#00C896",deals:active},
    {label:"Vinti",value:byS("won").length,color:"#10B981",deals:byS("won")},
    {label:"Persi",value:byS("lost").length,color:"#EF4444",deals:byS("lost")},
    {label:"MANT medio",value:avgMant,color:"#F59E0B",deals:deals},
    {label:"In demo",value:byS("demo").length,color:"#8B5CF6",deals:byS("demo")},
    {label:"In proposta",value:byS("proposal").length,color:"#3B82F6",deals:byS("proposal")},
    {label:"Alta priorità (MANT≥7)",value:deals.filter(d=>mantScore(d.mant)>=7).length,color:"#FF6B35",deals:deals.filter(d=>mantScore(d.mant)>=7)},
    {label:"Negoziazione",value:byS("negotiation").length,color:"#FF6B35",deals:byS("negotiation")},
    {label:"Qualificati",value:byS("qualified").length,color:"#3B82F6",deals:byS("qualified")},
  ];
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
        {stats.map(s=>(
          <div key={s.label} onClick={()=>setDrilldown(s)}
            style={{...card,padding:"16px 20px",cursor:"pointer",transition:"border-color .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=s.color}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#252836"}>
            <div style={{fontSize:32,fontWeight:800,color:s.color,fontFamily:"monospace"}}>{s.value}</div>
            <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",letterSpacing:1,marginTop:4}}>{s.label}</div>
            <div style={{fontSize:10,color:"#374151",marginTop:6}}>clicca per dettaglio →</div>
          </div>
        ))}
      </div>
      <div style={{...card,padding:20}}>
        <p style={{margin:"0 0 14px",fontSize:12,color:"#6B7280",textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Deal recenti</p>
        {deals.slice(0,6).map(d=>{
          const ph=phaseOf(d.status);
          return(
            <div key={d.id} onClick={()=>onSelect(d.id)}
              style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 6px",borderBottom:"1px solid #252836",cursor:"pointer",borderRadius:4}}
              onMouseEnter={e=>e.currentTarget.style.background="#13151F"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div>
                <span style={{fontSize:14,color:"#E5E7EB",fontWeight:600}}>{d.company}</span>
                <span style={{fontSize:11,color:"#6B7280",marginLeft:10}}>{d.contact}</span>
              </div>
              <div style={{display:"flex",gap:14,alignItems:"center"}}>
                <MantBars mant={d.mant} size="small"/>
                <span style={{fontSize:10,padding:"2px 8px",background:ph.color+"22",color:ph.color,borderRadius:20}}>{ph.label}</span>
              </div>
            </div>
          );
        })}
      </div>
      {drilldown&&<DrilldownModal title={drilldown.label} deals={drilldown.deals} onSelect={onSelect} onClose={()=>setDrilldown(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════
function App(){
  const [session,setSession]=useState(()=>loadSession());
  const [deals,setDeals]=useState([]);
  const [loading,setLoading]=useState(false);
  const [loadErr,setLoadErr]=useState("");
  const [view,setView]=useState("dashboard");
  const [selectedId,setSelectedId]=useState(null);
  const [showAddDeal,setShowAddDeal]=useState(false);
  const [showUsers,setShowUsers]=useState(false);
  const [showPwd,setShowPwd]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const [lastSync,setLastSync]=useState(null);

  // Carica deal quando loggato
  useEffect(()=>{
    if(!session)return;
    loadDeals();
  },[session]);

  const loadDeals=async()=>{
    setLoading(true);setLoadErr("");
    const r=await api("getDeals",{},session.token);
    setLoading(false);
    if(r.ok){setDeals(r.deals);setLastSync(new Date());}
    else if(r.error&&r.error.includes("Sessione")){handleLogout();}
    else setLoadErr(r.error||"Errore caricamento.");
  };

  const handleLogout=()=>{clearSession();setSession(null);setDeals([]);};

  const handleLogin=s=>{setSession(s);};

  const updateDeal=useCallback(async(updated)=>{
    setDeals(ds=>ds.map(d=>d.id===updated.id?updated:d));
    await api("saveDeal",{deal:updated},session.token);
  },[session]);

  const addDeal=useCallback(async(deal)=>{
    setDeals(ds=>[deal,...ds]);
    setShowAddDeal(false);
    await api("saveDeal",{deal},session.token);
  },[session]);

  const deleteDeal=useCallback(async(dealId)=>{
    setDeals(ds=>ds.filter(d=>d.id!==dealId));
    setView("list");setSelectedId(null);
    await api("deleteDeal",{dealId},session.token);
  },[session]);

  const selectDeal=useCallback(id=>{setSelectedId(id);setView("detail");},[]);

  if(!session) return<LoginScreen onLogin={handleLogin}/>;

  const selectedDeal=deals.find(d=>d.id===selectedId);
  const activeCount=deals.filter(d=>!["won","lost"].includes(d.status)).length;
  const NAV=[{key:"dashboard",icon:"⬡",label:"Dashboard"},{key:"list",icon:"≡",label:"Deal"},{key:"pipeline",icon:"▤",label:"Pipeline"}];

  return(
    <div style={{display:"flex",height:"100vh",background:"#0F1117",fontFamily:"Inter,system-ui,sans-serif",color:"#E5E7EB",overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:210,background:"#13151F",borderRight:"1px solid #1E2130",display:"flex",flexDirection:"column",padding:"0 0 20px",flexShrink:0}}>
        <div style={{padding:"22px 18px 16px"}}>
          <div style={{fontSize:17,fontWeight:800,color:"#00C896",letterSpacing:-0.5}}>GembaShot</div>
          <div style={{fontSize:10,color:"#4B5563",letterSpacing:2,textTransform:"uppercase",marginTop:2}}>CRM Pipeline</div>
        </div>
        <div style={{height:1,background:"#1E2130",margin:"0 18px 16px"}}/>
        {NAV.map(n=>{
          const isActive=view===n.key;
          return(
            <button key={n.key} onClick={()=>{setView(n.key);setSelectedId(null);}} style={{
              display:"flex",alignItems:"center",gap:10,padding:"11px 18px",
              background:isActive?"#1A1D27":"none",border:"none",
              borderLeft:isActive?"2px solid #00C896":"2px solid transparent",
              cursor:"pointer",color:isActive?"#E5E7EB":"#6B7280",fontSize:13,textAlign:"left",width:"100%"}}>
              <span style={{fontSize:14}}>{n.icon}</span>{n.label}
            </button>
          );
        })}
        <div style={{flex:1}}/>
        <div style={{padding:"0 18px 14px"}}>
          <button onClick={()=>setShowAddDeal(true)}
            style={{width:"100%",padding:"9px 0",background:"#00C896",border:"none",color:"#0F1117",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:13}}>
            + Nuovo Deal
          </button>
        </div>
        <div style={{padding:"0 18px",fontSize:10,color:"#374151",lineHeight:1.8}}>
          {activeCount} deal attivi · {deals.filter(d=>d.status==="won").length} vinti
        </div>
        {/* User menu */}
        <div style={{margin:"10px 18px 0",position:"relative"}}>
          <button onClick={()=>setMenuOpen(m=>!m)}
            style={{width:"100%",background:"#1A1D27",border:"1px solid #252836",borderRadius:6,padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:"#00C89622",border:"1px solid #00C896",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#00C896",fontWeight:700}}>
              {(session.displayName||session.username).charAt(0).toUpperCase()}
            </div>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{fontSize:12,color:"#E5E7EB",fontWeight:600,lineHeight:1}}>{session.displayName}</div>
              <div style={{fontSize:10,color:"#6B7280",marginTop:2}}>{session.role}</div>
            </div>
            <span style={{color:"#6B7280",fontSize:10}}>{menuOpen?"▲":"▼"}</span>
          </button>
          {menuOpen&&(
            <div style={{position:"absolute",bottom:"calc(100% + 4px)",left:0,right:0,background:"#1A1D27",border:"1px solid #252836",borderRadius:6,overflow:"hidden",zIndex:50}}>
              <button onClick={()=>{setShowPwd(true);setMenuOpen(false);}}
                style={{width:"100%",padding:"10px 14px",background:"none",border:"none",color:"#E5E7EB",cursor:"pointer",textAlign:"left",fontSize:13}}>🔑 Cambia password</button>
              {session.role==="admin"&&(
                <button onClick={()=>{setShowUsers(true);setMenuOpen(false);}}
                  style={{width:"100%",padding:"10px 14px",background:"none",border:"none",color:"#E5E7EB",cursor:"pointer",textAlign:"left",fontSize:13}}>👥 Gestione utenti</button>
              )}
              <button onClick={()=>{loadDeals();setMenuOpen(false);}}
                style={{width:"100%",padding:"10px 14px",background:"none",border:"none",color:"#E5E7EB",cursor:"pointer",textAlign:"left",fontSize:13}}>🔄 Sincronizza</button>
              <div style={{height:1,background:"#252836"}}/>
              <button onClick={handleLogout}
                style={{width:"100%",padding:"10px 14px",background:"none",border:"none",color:"#EF4444",cursor:"pointer",textAlign:"left",fontSize:13}}>↩ Logout</button>
            </div>
          )}
        </div>
        {lastSync&&<div style={{padding:"6px 18px 0",fontSize:9,color:"#252836"}}>Sync: {lastSync.toLocaleTimeString("it")}</div>}
      </div>

      {/* Main */}
      <div style={{flex:1,overflowY:"auto",padding:28}}>
        {loading&&<div style={{color:"#6B7280",textAlign:"center",padding:60,fontSize:14}}>⏳ Caricamento deal da Google Sheets...</div>}
        {loadErr&&(
          <div style={{background:"#2D1515",border:"1px solid #7F1D1D",borderRadius:8,padding:20,marginBottom:20}}>
            <p style={{color:"#FCA5A5",fontWeight:600,marginBottom:8}}>Errore di connessione</p>
            <p style={{color:"#9CA3AF",fontSize:13,marginBottom:12}}>{loadErr}</p>
            <p style={{color:"#6B7280",fontSize:12,marginBottom:12}}>Verifica che l'URL Apps Script in <code style={{color:"#00C896"}}>API_URL</code> sia corretto e che lo script sia pubblicato come Web App.</p>
            <button onClick={loadDeals} style={btnGreen}>Riprova</button>
          </div>
        )}
        {!loading&&!loadErr&&(
          <>
            {view==="dashboard"&&<><h2 style={{margin:"0 0 20px",color:"#F9FAFB"}}>Dashboard</h2><Dashboard deals={deals} onSelect={selectDeal}/></>}
            {view==="list"&&<><h2 style={{margin:"0 0 20px",color:"#F9FAFB"}}>Tutti i Deal</h2><DealsList deals={deals} onSelect={selectDeal}/></>}
            {view==="pipeline"&&<><h2 style={{margin:"0 0 20px",color:"#F9FAFB"}}>Pipeline</h2><Pipeline deals={deals} onSelect={selectDeal}/></>}
            {view==="detail"&&selectedDeal&&<DealDetail deal={selectedDeal} session={session} onUpdate={updateDeal} onBack={()=>setView("list")} onDelete={deleteDeal}/>}
          </>
        )}
      </div>

      {showAddDeal&&<DealModal session={session} onClose={()=>setShowAddDeal(false)} onSave={addDeal}/>}
      {showUsers&&<UserManager session={session} onClose={()=>setShowUsers(false)}/>}
      {showPwd&&<ChangePasswordModal session={session} onClose={()=>setShowPwd(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
